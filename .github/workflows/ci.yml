name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: server/package-lock.json
      - working-directory: server
        run: npm ci
      - working-directory: server
        run: npm run typecheck
      - working-directory: server
        run: npm run build

  client:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: client/package-lock.json
      - working-directory: client
        run: npm ci
      - working-directory: client
        run: npm run typecheck
      - working-directory: client
        run: npm run build

  e2e:
    runs-on: ubuntu-24.04
    env:
      PORT: '3001'
      NODE_ENV: development
      ACCESS_TOKEN: kakako
      YC_FOLDER_ID: dummy
      YC_API_KEY: dummy
      YC_SEARCH_API_KEY: dummy
      MODEL_ID: yandexgpt-lite
      DATABASE_PATH: ./data/ci.sqlite3
      CORS_ORIGIN: http://localhost:5173
      VITE_API_URL: http://localhost:3001
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Собрать сервер
        working-directory: server
        run: |
          npm ci
          npm run build
          mkdir -p data

      - name: Установить зависимости клиента
        working-directory: client
        run: npm ci

      - name: Установить e2e и браузер Playwright
        working-directory: e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Поднять сервер и клиент, прогнать e2e
        run: |
          (cd server && node dist/server/src/index.js) &
          (cd client && npm run dev -- --port 5173 --strictPort) &

          for i in $(seq 1 30); do
            curl -s -o /dev/null http://localhost:3001/ && curl -s -o /dev/null http://localhost:5173/ && break
            sleep 1
          done

          cd e2e && npm test

      - name: Загрузить отчёт Playwright при падении
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
